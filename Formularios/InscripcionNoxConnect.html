<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Src/imgs/Logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="Styles/styles.css">
    <title>NoxConnect 2026 - Emprendimientos</title>
</head>

<body>

    <div class="container">
        <div class="logo">
            <img src="../Src/imgs/Logo.png" alt="NoxConnect">
        </div>


        <h1>NoxConnect 2026</h1>
        <p> Formulario de Registro de Asistencia </p>

        <form id="nxForm" action="https://formsubmit.co/noxxity.oficial@gmail.com" method="POST">

            <!-- Configuración de FormSubmit -->
            <input type="hidden" name="_subject" value="📋 Nuevo registro - NoxConnect 2026">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false">


            <input type="hidden" name="_next" value="">

            <div class="section-title">
                <i class="fa-solid fa-user"></i>
                Información Personal
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Nombre(s)</label>
                    <input type="text" name="Nombre" required>
                </div>

                <div class="form-group">
                    <label>Apellido(s)</label>
                    <input type="text" name="Apellido" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" name="Correo electrónico" required>
                </div>

                <div class="form-group">
                    <label>Número de teléfono</label>
                    <input type="tel" name="Número de teléfono" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Número de identidad</label>
                    <input type="text" name="Número de identidad" required>
                </div>

                <div class="form-group">
                    <label>Ciudad o lugar de procedencia</label>
                    <input type="text" name="Procedencia" required>
                </div>
            </div>

            <div class="section-title">
                <i class="fa-solid fa-briefcase"></i>
                Información Profesional
            </div>

            <div class="form-group">
                <label>Tipo de institución</label>
                <select id="tipoInstitucion" name="Tipo de institución" required>
                    <option value="">Seleccione una opción</option>
                    <option>Universidad</option>
                    <option>Empresa</option>
                    <option>Emprendimiento</option>
                    <option>Independiente</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group otro-campo" id="otroInstitucionGroup">
                <label>Especifique la institución</label>
                <input type="text" id="otroInstitucion" name="Otra institución">
            </div>

            <div class="form-group">
                <label>Nombre de la institución / empresa / emprendimiento</label>
                <input type="text" name="Institución">
            </div>

            <div class="form-group">
                <label>Rol principal</label>
                <select id="rolPrincipal" name="Rol principal" required>
                    <option value="">Seleccione una opción</option>
                    <option>Estudiante</option>
                    <option>Emprendedor</option>
                    <option>Profesional</option>
                    <option>Docente</option>
                    <option>Freelancer</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group otro-campo" id="otroRolGroup">
                <label>Especifique el rol</label>
                <input type="text" id="otroRol" name="Otro rol">
            </div>

            <div class="form-group">
                <label>Área de interés</label>
                <select id="areaInteres" name="Área de interés" required>
                    <option value="">Seleccione una opción</option>
                    <option>Desarrollo</option>
                    <option>Marketing</option>
                    <option>Diseño</option>
                    <option>Comunicación</option>
                    <option>Mercadeo</option>
                    <option>Innovación</option>
                    <option>Inteligencia Artificial</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group otro-campo" id="otraAreaGroup">
                <label>Especifique el área</label>
                <input type="text" id="otraArea" name="Otra área de interés">
            </div>

            <div class="section-title">
                <i class="fa-solid fa-shield-halved"></i>
                Autorizaciones
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="datos" name="Acepta tratamiento de datos" value="Sí">

                <label for="datos">
                    Acepto el tratamiento de mis datos personales para fines relacionados con la organización del
                    evento.
                </label>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="fotos" name="Autoriza uso de fotografías" value="Sí">

                <label for="fotos">
                    Autorizo el uso de fotografías y videos tomados durante el evento para publicaciones de Noxxity.
                </label>
            </div>

            <button class="btn" type="submit">
                Registrar asistencia
            </button>

        </form>

    </div>

    <div id="nxModal">
        <div class="nx-modal-card">

            <div class="nx-success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h2>¡Registro completado!</h2>

            <p>
                Su formulario ha sido enviado correctamente.
                Gracias por registrarse.
            </p>

            <button id="nxClose">Continuar</button>

        </div>
    </div>

    <script src="Js/main.js"></script>
</body>

</html>
