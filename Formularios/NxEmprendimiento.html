<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Src/imgs/Logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="Styles/styles.css">
    <title>NoxConnect 2026 - Emprendimientos</title>
</head>

<body>

    <div class="container">
        <div class="logo">
            <img src="../Src/imgs/Logo.png" alt="NoxConnect">
        </div>


        <h1>NoxConnect 2026</h1>
        <p> Formulario de Registro de Asistencia </p>

        <form id="nxForm" action="https://formsubmit.co/noxxity.oficial@gmail.com" method="POST">

            <!-- Configuración de FormSubmit -->
            <input type="hidden" name="_subject" value="📋 Nuevo registro - NoxConnect 2026">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false">


            <input type="hidden" name="_next" value=""> 

            <div class="section-title">
                <i class="fa-solid fa-user"></i>
                Información Personal
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Nombre(s)</label>
                    <input type="text" name="Nombre" required>
                </div>

                <div class="form-group">
                    <label>Apellido(s)</label>
                    <input type="text" name="Apellido" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" name="Correo electrónico" required>
                </div>

                <div class="form-group">
                    <label>Número de teléfono</label>
                    <input type="tel" name="Número de teléfono" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Número de identidad</label>
                    <input type="text" name="Número de identidad" required>
                </div>

                <div class="form-group">
                    <label>Ciudad o lugar de procedencia</label>
                    <input type="text" name="Procedencia" required>
                </div>
            </div>

            <div class="section-title">
                <i class="fa-solid fa-briefcase"></i>
                Información Profesional
            </div>

            <div class="form-group">
                <label>Institución de procedencia</label>
                <select name="Tipo de institución" required>
                    <option value="">Seleccione una opción</option>
                    <option>Universidad</option>
                    <option>Empresa</option>
                    <option>Emprendimiento</option>
                    <option>Independiente</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre de la institución / empresa / emprendimiento</label>
                <input type="text" name="Institución">
            </div>

            <div class="form-group">
                <label>Rol principal</label>
                <select name="Rol principal" required>
                    <option value="">Seleccione una opción</option>
                    <option>Estudiante</option>
                    <option>Emprendedor</option>
                    <option>Profesional</option>
                    <option>Docente</option>
                    <option>Freelancer</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Área de interés</label>
                <select name="Área de interés" required>
                    <option value="">Seleccione una opción</option>
                    <option>Desarrollo</option>
                    <option>Marketing</option>
                    <option>Diseño</option>
                    <option>Comunicación</option>
                    <option>Mercadeo</option>
                    <option>Innovación</option>
                    <option>Inteligencia Artificial</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="section-title">
                <i class="fa-solid fa-shield-halved"></i>
                Autorizaciones
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="datos" name="Acepta tratamiento de datos" value="Sí" required>

                <label for="datos">
                    Acepto el tratamiento de mis datos personales para fines relacionados con la organización del
                    evento.
                </label>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="fotos" name="Autoriza uso de fotografías" value="Sí" required>

                <label for="fotos">
                    Autorizo el uso de fotografías y videos tomados durante el evento para publicaciones de Noxxity.
                </label>
            </div>

            <button class="btn" type="submit">
                Registrar asistencia
            </button>

        </form>


        <!-- Modal de confirmación -->
        <div id="nxModal" style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:9999;">
            <div style="background:#fff;padding:24px;border-radius:8px;max-width:90%;width:420px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,0.2);">
                <div style="font-size:40px;color:#28a745;margin-bottom:16px;">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h2 style="margin:0 0 12px;font-size:20px;">¡Enviado!</h2>
                <p style="margin:0 0 18px;color:#333;">Su formulario ha sido enviado correctamente.</p>
                <button id="nxClose" style="padding:8px 14px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer;">Aceptar</button>
            </div>
        </div>

        <script>
            (function(){
                const form = document.getElementById('nxForm');
                const modal = document.getElementById('nxModal');
                const closeBtn = document.getElementById('nxClose');

                function showModal(){ modal.style.display = 'flex'; }
                function hideModal(){ modal.style.display = 'none'; }

                form.addEventListener('submit', function(e){
                    e.preventDefault();
                    const url = form.action;
                    const data = new FormData(form);

                    fetch(url, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
                    .then(response => {
                        // FormSubmit devuelve 200 o 302; mostramos modal en caso de éxito
                        showModal();
                        form.reset();
                    })
                    .catch(err => {
                        // en caso de error también mostrar mensaje simple
                        showModal();
                    });
                });

                closeBtn.addEventListener('click', function(){ hideModal(); });
                // cerrar al hacer click fuera del cuadro
                modal.addEventListener('click', function(e){ if(e.target===modal) hideModal(); });
            })();
        </script>

        <script src="Js/main.js"></script>
</body>

</html>
