<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../Src/imgs/Logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="Styles/styles.css">
    <title>NoxConnect 2026 - Emprendimientos</title>
</head>

<body>

    <div class="container">
        <div class="logo">
            <img src="../Src/imgs/Logo.png" alt="NoxConnect">
        </div>


        <h1>NoxConnect 2026</h1>
        <p> Formulario de Registro de Asistencia </p>

        <form id="nxForm" action="https://formsubmit.co/noxxity.oficial@gmail.com" method="POST">

            <!-- Configuración de FormSubmit -->
            <input type="hidden" name="_subject" value="📋 Nuevo registro - NoxConnect 2026">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="_captcha" value="false">


            <input type="hidden" name="_next" value="">

            <div class="section-title">
                <i class="fa-solid fa-user"></i>
                Información Personal
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Nombre(s)</label>
                    <input type="text" name="Nombre" required>
                </div>

                <div class="form-group">
                    <label>Apellido(s)</label>
                    <input type="text" name="Apellido" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <input type="email" name="Correo electrónico" required>
                </div>

                <div class="form-group">
                    <label>Número de teléfono</label>
                    <input type="tel" name="Número de teléfono" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>Número de identidad</label>
                    <input type="text" name="Número de identidad" required>
                </div>

                <div class="form-group">
                    <label>Ciudad o lugar de procedencia</label>
                    <input type="text" name="Procedencia" required>
                </div>
            </div>

            <div class="section-title">
                <i class="fa-solid fa-briefcase"></i>
                Información Profesional
            </div>

            <div class="form-group">
                <label>Institución de procedencia</label>
                <select name="Tipo de institución" required>
                    <option value="">Seleccione una opción</option>
                    <option>Universidad</option>
                    <option>Empresa</option>
                    <option>Emprendimiento</option>
                    <option>Independiente</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nombre de la institución / empresa / emprendimiento</label>
                <input type="text" name="Institución">
            </div>

            <div class="form-group">
                <label>Rol principal</label>
                <select name="Rol principal" required>
                    <option value="">Seleccione una opción</option>
                    <option>Estudiante</option>
                    <option>Emprendedor</option>
                    <option>Profesional</option>
                    <option>Docente</option>
                    <option>Freelancer</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="form-group">
                <label>Área de interés</label>
                <select name="Área de interés" required>
                    <option value="">Seleccione una opción</option>
                    <option>Desarrollo</option>
                    <option>Marketing</option>
                    <option>Diseño</option>
                    <option>Comunicación</option>
                    <option>Mercadeo</option>
                    <option>Innovación</option>
                    <option>Inteligencia Artificial</option>
                    <option>Otro</option>
                </select>
            </div>

            <div class="section-title">
                <i class="fa-solid fa-shield-halved"></i>
                Autorizaciones
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="datos" name="Acepta tratamiento de datos" value="Sí">

                <label for="datos">
                    Acepto el tratamiento de mis datos personales para fines relacionados con la organización del
                    evento.
                </label>
            </div>

            <div class="form-group checkbox">
                <input type="checkbox" id="fotos" name="Autoriza uso de fotografías" value="Sí">

                <label for="fotos">
                    Autorizo el uso de fotografías y videos tomados durante el evento para publicaciones de Noxxity.
                </label>
            </div>

            <button class="btn" type="submit">
                Registrar asistencia
            </button>

        </form>


        <!-- Modal de confirmación -->
        <style>
            /* Fondo del modal */
            #nxModal {
                position: fixed;
                inset: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                background: rgba(7, 17, 31, .70);
                backdrop-filter: blur(8px);
                z-index: 99999;

                opacity: 0;
                visibility: hidden;
                transition: .35s ease;
            }

            #nxModal.show {
                opacity: 1;
                visibility: visible;
            }

            /* Tarjeta */
            .nx-modal-card {
                width: 430px;
                max-width: 90%;
                background: #fff;
                border-radius: 22px;
                padding: 45px 35px;
                text-align: center;
                box-shadow:
                    0 30px 80px rgba(0, 0, 0, .35),
                    0 10px 25px rgba(0, 0, 0, .15);
                animation: modalEntrada .45s ease;
            }

            /* Ícono */
            .nx-success-icon {
                width: 110px;
                height: 110px;
                margin: 0 auto 25px;
                border-radius: 50%;
                background: linear-gradient(135deg, #34d399, #16a34a);
                display: flex;
                justify-content: center;
                align-items: center;
                box-shadow:
                    0 15px 35px rgba(22, 163, 74, .45),
                    inset 0 2px 8px rgba(255, 255, 255, .35);
            }

            .nx-success-icon i {
                color: white;
                font-size: 56px;
            }

            /* Título */
            .nx-modal-card h2 {
                margin: 0;
                font-size: 30px;
                font-weight: 700;
                color: #07111F;
            }

            /* Texto */
            .nx-modal-card p {
                margin: 18px 0 32px;
                color: #5b6470;
                font-size: 17px;
                line-height: 1.6;
            }

            /* Botón */
            #nxClose {
                width: 100%;
                padding: 15px;
                border: none;
                border-radius: 12px;
                background: #07111F;
                color: white;
                font-size: 16px;
                font-weight: 600;
                cursor: pointer;
                transition: .25s;
            }

            #nxClose:hover {
                background: #0f1f38;
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(7, 17, 31, .35);
            }

            @keyframes modalEntrada {
                from {
                    opacity: 0;
                    transform: translateY(30px) scale(.9);
                }

                to {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
            }
        </style>

        <div id="nxModal">
            <div class="nx-modal-card">

                <div class="nx-success-icon">
                    <i class="fa-solid fa-circle-check"></i>
                </div>

                <h2>¡Registro completado!</h2>

                <p>
                    Su formulario ha sido enviado correctamente.
                    Gracias por registrarse.
                </p>

                <button id="nxClose">Continuar</button>

            </div>
        </div>

        <script>
            (function () {

                const form = document.getElementById('nxForm');
                const modal = document.getElementById('nxModal');
                const closeBtn = document.getElementById('nxClose');

                function showModal() {
                    modal.classList.add("show");
                }

                function hideModal() {
                    modal.classList.remove("show");
                }

                form.addEventListener('submit', function (e) {

                    e.preventDefault();

                    const url = form.action;
                    const data = new FormData(form);

                    fetch(url, {
                        method: 'POST',
                        body: data,
                        headers: {
                            'Accept': 'application/json'
                        }
                    })
                        .then(response => {
                            showModal();
                            form.reset();
                        })
                        .catch(error => {
                            showModal();
                        });

                });

                closeBtn.addEventListener('click', hideModal);

                modal.addEventListener('click', function (e) {
                    if (e.target === modal) {
                        hideModal();
                    }
                });

            })();
        </script>

        <script src="Js/main.js"></script>
</body>

</html>
